name: Repository Health

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Markdown Lint
        run: |
          npm install -g markdownlint-cli
          markdownlint "**/*.md" --config .markdownlint.json

  link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Link Checker
        uses: lycheeverse/lychee-action@v1.9.0
        with:
          args: --verbose --no-progress --exclude "milehigh-world.com" --exclude "docs.unity.com" --exclude "unity3d.com" "**/*.md"
          fail: true
